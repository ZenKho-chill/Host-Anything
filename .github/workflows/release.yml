name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    # Self-hosted Debian runner — requires: Go, Node, Docker, dpkg-deb.
    runs-on: [self-hosted, debian]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify toolchain
        run: |
          go version
          node --version
          npm --version
          docker --version
          dpkg-deb --version

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm ci

      - name: Build Frontend
        working-directory: ./web
        run: npm run build

      - name: Build Go Binaries
        working-directory: ./core
        run: |
          mkdir -p ../bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o ../bin/hostanything-linux-amd64 ./cmd/hostanything

          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o ../bin/hostanything-linux-arm64 ./cmd/hostanything

      - name: Package as .deb (amd64)
        run: |
          chmod +x scripts/package-deb.sh
          VERSION=${{ steps.version.outputs.VERSION }} ARCH=amd64 \
            bash scripts/package-deb.sh

      - name: Package as .deb (arm64)
        run: |
          VERSION=${{ steps.version.outputs.VERSION }} ARCH=arm64 \
            bash scripts/package-deb.sh

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hostanything:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/hostanything:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            bin/hostanything-linux-amd64
            bin/hostanything-linux-arm64
            dist/hostanything_${{ steps.version.outputs.VERSION }}_amd64.deb
            dist/hostanything_${{ steps.version.outputs.VERSION }}_arm64.deb
