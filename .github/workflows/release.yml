name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm ci

      - name: Build Frontend
        working-directory: ./web
        run: npm run build

      - name: Embed Frontend Assets
        run: |
          mkdir -p internal/web/dist
          cp -r web/dist/* internal/web/dist/

      - name: Build Go Binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/hostanything-linux-amd64 ./cmd/hostanything
          GOOS=linux GOARCH=arm64 go build -o bin/hostanything-linux-arm64 ./cmd/hostanything

      - name: Package as .deb
        run: |
          chmod +x scripts/package-deb.sh
          ./scripts/package-deb.sh linux amd64 bin/hostanything-linux-amd64
          ./scripts/package-deb.sh linux arm64 bin/hostanything-linux-arm64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hostanything:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/hostanything:latest

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            bin/hostanything-linux-amd64
            bin/hostanything-linux-arm64
            dist/*.deb
