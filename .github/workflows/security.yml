name: Security Scan

on:
  schedule:
    # Run every Monday at 00:00 UTC.
    - cron: '0 0 * * 1'
  push:
    branches:
      - main

permissions:
  security-events: write
  contents: read

jobs:
  security-scan:
    name: Security Vulnerability Scans
    # Self-hosted Debian runner — requires: Go, trivy, nancy.
    # Install trivy: https://aquasecurity.github.io/trivy/latest/getting-started/installation/
    # Install nancy: go install github.com/sonatype-nexus-community/nancy@latest
    runs-on: [self-hosted, debian]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify toolchain
        run: go version

      - name: Run govulncheck
        working-directory: ./core
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run Trivy Vulnerability Scanner
        # trivy must be installed on the self-hosted runner.
        run: |
          trivy fs . \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --exit-code 0

      - name: Upload Trivy SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Run Nancy (Go dependency CVE check)
        working-directory: ./core
        run: |
          go list -json -m all | nancy sleuth
        env:
          NANCY_IGNORE: ""
