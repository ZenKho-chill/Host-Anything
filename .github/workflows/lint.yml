name: Lint Pipeline

on:
  pull_request:
    branches:
      - '**'

jobs:
  go-lint:
    name: Go Lint
    runs-on: [self-hosted]
    defaults:
      run:
        working-directory: ./core
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Go installation
        run: go version

      - name: Run golangci-lint
        # golangci-lint must be installed on the self-hosted runner.
        # Install: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin
        run: golangci-lint run --config=.golangci.yml ./...

      - name: Check goimports formatting
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          diff=$(goimports -d -e .)
          if [ -n "$diff" ]; then
            echo "goimports found formatting issues:"
            echo "$diff"
            exit 1
          fi

  web-lint:
    name: Web Lint
    runs-on: [self-hosted, debian]
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Node installation
        run: node --version && npm --version

      - name: Install dependencies
        run: npm ci

      - name: ESLint Check
        run: npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 0

      - name: Prettier Check
        run: npx prettier --check .

  markdown-lint:
    name: Markdown Lint
    runs-on: [self-hosted, debian]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run markdownlint
        # markdownlint-cli2 must be installed: npm install -g markdownlint-cli2
        run: markdownlint-cli2 "**/*.md" "#node_modules"
