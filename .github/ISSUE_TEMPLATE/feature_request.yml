name: Feature Request
description: Suggest an idea for this project
title: "[FEATURE] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature for Host Anything!

  - type: dropdown
    id: feature-type
    attributes:
      label: Feature Type
      description: Which area of Host Anything does this feature request relate to?
      options:
        - core
        - template-engine
        - runtime-adapter
        - web-ui
        - marketplace
        - auth
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the requested feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Use Case
      description: Why do you need this feature? What problem does it solve for you?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Solution
      description: If you have a specific implementation in mind, please describe it here.
  
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
