name: Bug Report
description: Create a report to help us improve Host Anything
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us resolve the issue.

  - type: input
    id: version
    attributes:
      label: Host Anything Version
      description: Which version of Host Anything are you using? (e.g. v1.2.3 or commit hash)
      placeholder: v1.0.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Debian Version
      description: Which operating system are you using? (e.g. Debian 12, Ubuntu 22.04)
      placeholder: Debian 12 Bookworm
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Container Runtime
      description: Which container runtime are you using with Host Anything?
      options:
        - Docker
        - Podman
        - Kubernetes
        - Host Mode (Native)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide clear steps to reproduce the issue.
      placeholder: |
        1. Install hostanything via .deb
        2. Create a new service from template X
        3. Attempt to start the service
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? (Include error messages, stack traces, etc.)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please provide relevant logs (e.g. from journalctl -u hostanything or the specific container logs). You can drag and drop log files here.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g. network setup, reverse proxy configuration).
